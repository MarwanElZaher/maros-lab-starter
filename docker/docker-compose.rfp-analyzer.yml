version: "3.9"
name: maroslab-rfp-analyzer

# RFP Analysis LangGraph service — ACME presales pipeline (MAR-16/MAR-18)
#
# Usage:
#   docker compose -f docker/docker-compose.rfp-analyzer.yml --env-file .env.rfp-analyzer up -d --build
#
# Required env vars (copy from .env.rfp-analyzer.example):
#   OPENROUTER_API_KEY, RAGFLOW_API_KEY, RAGFLOW_BASE_URL,
#   RAGFLOW_DATASET_PRODUCTS, RAGFLOW_DATASET_PRICING, RAGFLOW_DATASET_PAST_BIDS,
#   RAGFLOW_DATASET_LICENSING, RAGFLOW_DATASET_USER_GUIDES
#
# Internal access: http://rfp-analyzer:3000 (docker DNS, no auth)
# Public access: not exposed — n8n routes through internally.

services:
  rfp-analyzer:
    build:
      context: ../services/rfp-analyzer
      dockerfile: Dockerfile
    image: rfp-analyzer:latest
    restart: unless-stopped
    mem_limit: 1g
    environment:
      PORT: "3000"
      NODE_ENV: production
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # Some @langchain/openai versions read OPENAI_API_KEY directly for the
      # structured-output helper call; alias it to the OpenRouter key.
      OPENAI_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-haiku-4-5}
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY}
      # Set these once MAR-17 (Integrator) posts the dataset IDs
      RAGFLOW_DATASET_PRODUCTS: ${RAGFLOW_DATASET_PRODUCTS:-}
      RAGFLOW_DATASET_PRICING: ${RAGFLOW_DATASET_PRICING:-}
      RAGFLOW_DATASET_PAST_BIDS: ${RAGFLOW_DATASET_PAST_BIDS:-}
      RAGFLOW_DATASET_LICENSING: ${RAGFLOW_DATASET_LICENSING:-}
      RAGFLOW_DATASET_USER_GUIDES: ${RAGFLOW_DATASET_USER_GUIDES:-}
      # LangFuse tracing (MAR-82) — leave empty to disable tracing
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    networks:
      - n8n_default
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  n8n_default:
    external: true
