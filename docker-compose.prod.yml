version: "3.9"
name: maroslab-app

services:
  app:
    image: ${GHCR_IMAGE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - "traefik.http.routers.maros-lab-starter.rule=Host(`${APP_HOST}`)"
      - traefik.http.routers.maros-lab-starter.entrypoints=web,websecure
      - traefik.http.routers.maros-lab-starter.tls=true
      - traefik.http.routers.maros-lab-starter.tls.certresolver=mytlschallenge
      - traefik.http.services.maros-lab-starter.loadbalancer.server.port=3000
      - traefik.docker.network=n8n_default

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST}`)"
      - traefik.http.routers.minio-console.entrypoints=web,websecure
      - traefik.http.routers.minio-console.tls=true
      - traefik.http.routers.minio-console.tls.certresolver=mytlschallenge
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
      - traefik.docker.network=n8n_default

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    networks:
      - n8n_default
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET_RFP
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_RFP: ${MINIO_BUCKET_RFP:-rfp-pdfs}

volumes:
  minio_data:

networks:
  n8n_default:
    external: true
