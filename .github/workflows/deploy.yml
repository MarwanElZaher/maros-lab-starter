name: Deploy

on:
  push:
    branches: [main]

# VPS deploy pattern: PULL-LOOP (no inbound SSH from GH Actions).
# This workflow builds and pushes the image to GHCR.
# The VPS picks up the new image on the next maroslab-pull-loop.timer tick
# (every 2 minutes via systemd/maroslab-pull-loop.timer).
# Install the timer once with: sudo bash scripts/install-pull-loop.sh

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:main
            ${{ env.IMAGE }}:${{ github.sha }}
